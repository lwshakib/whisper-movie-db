name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🔎 Check Formatting
        run: bun run format:check

      - name: 🕵️‍♂️ Lint
        run: bun run lint

      - name: 🟦 Type Check
        run: bun run typecheck
